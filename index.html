<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>imo Admin Panel</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f7f9; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-item:hover { background: #e1f5fe; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #ebebeb; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 70%; }
        .sent { align-self: flex-end; background: #00a8ff; color: white; }
        .received { align-self: flex-start; background: white; }
        .input-area { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #00a8ff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar" id="userList">
    <h3 style="padding:15px; background:#00a8ff; color:white; margin:0;">Users</h3>
</div>

<div class="main">
    <div id="chatTitle" style="padding:15px; background:white; font-weight:bold; border-bottom:1px solid #ddd;">Select a user</div>
    <div class="chat-box" id="adminChatBox"></div>
    <div class="input-area">
        <input type="text" id="adminMsg" placeholder="Type reply...">
        <button onclick="sendAdminReply()">Reply</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYH0ZSeLjH_T3HJ9hVQ84afB5KyAEZi2Y",
        authDomain: "my-sc-tools.firebaseapp.com",
        databaseURL: "https://my-sc-tools-default-rtdb.firebaseio.com",
        projectId: "my-sc-tools",
        storageBucket: "my-sc-tools.firebasestorage.app",
        messagingSenderId: "285986090017",
        appId: "1:285986090017:web:7fca61fe27e3061db74760"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUserId = null;

    // ১. ইউজার লিস্ট লোড করা
    onValue(ref(db, 'users'), (snapshot) => {
        const userList = document.getElementById('userList');
        userList.innerHTML = '<h3 style="padding:15px; background:#00a8ff; color:white; margin:0;">Users</h3>';
        snapshot.forEach((child) => {
            const user = child.val();
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `<strong>ID: ${user.userId}</strong><br><small>${user.lastMessage}</small>`;
            div.onclick = () => loadUserChat(user.userId);
            userList.appendChild(div);
        });
    });

    // ২. নির্দিষ্ট ইউজারের চ্যাট লোড করা
    window.loadUserChat = function(id) {
        currentUserId = id;
        document.getElementById('chatTitle').innerText = "Chatting with ID: " + id;
        const chatBox = document.getElementById('adminChatBox');
        chatBox.innerHTML = '';

        onValue(ref(db, `chats/${id}/messages`), (snapshot) => {
            chatBox.innerHTML = '';
            snapshot.forEach((msgChild) => {
                const msg = msgChild.val();
                appendBubble(msg.text, msg.sender === 'admin' ? 'sent' : 'received');
            });
        });
    }

    window.sendAdminReply = function() {
        const text = document.getElementById('adminMsg').value;
        if (!text || !currentUserId) return;

        push(ref(db, `chats/${currentUserId}/messages`), {
            sender: 'admin',
            text: text,
            timestamp: Date.now()
        });

        document.getElementById('adminMsg').value = '';
    }

    function appendBubble(text, type) {
        const chatBox = document.getElementById('adminChatBox');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
